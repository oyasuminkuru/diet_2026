<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4月ダイエットプログラム</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+JP:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f2efe9;
    --paper: #faf8f5;
    --ink: #2c2620;
    --accent: #8c7b6b;
    --accent2: #7a9e7e;
    --muted: #9e9187;
    --line: #ddd8d0;
    --check: #8c7b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #ede9e2 0%, #f2efe9 100%);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 10%, rgba(140,123,107,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(122,158,126,0.06) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }
  .wrap { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }

  /* Header */
  header { text-align: center; padding: 32px 0 26px; border-bottom: 1px solid var(--accent); margin-bottom: 28px; }
  header::after { content: ''; display: block; border-bottom: 1px solid var(--line); margin-top: 5px; }
  .label-tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-size: clamp(28px, 7vw, 44px); font-weight: 300; line-height: 1.15; letter-spacing: 0.12em; font-family: 'Cormorant Garamond', serif; font-style: italic; }
  .sub { margin-top: 8px; font-size: 11px; color: #7a6e65; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.18em; font-style: normal; }

  /* Progress */
  .progress-bar-wrap {
    background: var(--paper); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 18px; margin-bottom: 24px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 12px rgba(44,38,32,0.07);
  }
  .progress-text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
  .progress-bar { flex: 1; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
  .progress-pct { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); min-width: 36px; text-align: right; }

  /* Calendar */
  .calendar-wrap {
    background: var(--paper); border: 1px solid var(--line); border-radius: 16px;
    padding: 18px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(44,38,32,0.06);
  }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-title { font-size: 14px; font-weight: 700; letter-spacing: 0.06em; }
  .cal-week-badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; background: var(--accent);
    color: white; padding: 2px 10px; border-radius: 20px; letter-spacing: 0.05em;
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); padding: 4px 0; letter-spacing: 0.05em; }
  .cal-dow.sun { color: #e05555; }
  .cal-dow.sat { color: var(--accent); }
  .cal-day {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 8px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500;
    color: var(--ink); border: 1.5px solid transparent; transition: all 0.18s; position: relative; gap: 2px;
  }
  .cal-day:hover { background: #ede8e1; border-color: var(--accent); }
  .cal-day.sun-day { color: #e05555; }
  .cal-day.sat-day { color: var(--accent); }
  .cal-day.selected { background: var(--accent); border-color: var(--accent); color: white !important; }
  .cal-day.complete { background: #e8f0e8; border-color: var(--accent2); }
  .cal-day.complete .day-num { color: var(--accent2); }
  .cal-day.selected { background: var(--accent) !important; border-color: var(--accent) !important; }
  .cal-day.selected .day-num { color: white !important; }
  .cal-day.selected .dot { background: white !important; opacity: 1 !important; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); opacity: 0; transition: opacity 0.2s; }
  .cal-day.has-data .dot { opacity: 1; }
  .day-num { font-size: 13px; line-height: 1; }

  /* Date header */
  .date-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
  .date-badge {
    background: var(--accent); color: white; border-radius: 10px; padding: 8px 14px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.05em; line-height: 1.5;
    text-align: center; min-width: 52px;
  }
  .date-badge .day-big { font-size: 22px; font-weight: 500; display: block; line-height: 1.1; }
  .date-info .week-label { font-size: 12px; color: var(--accent); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.08em; }
  .date-info .day-progress { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }

  /* Checklist area */
  .checklist-area {
    background: var(--paper); border: 1px solid var(--line); border-radius: 16px;
    padding: 18px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(44,38,32,0.06);
  }

  /* Section */
  .section { margin-bottom: 18px; }
  .section-head { display: flex; align-items: center; gap: 10px; padding: 8px 0 6px; border-bottom: 1px solid var(--line); margin-bottom: 8px; }
  .section-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
  .icon-food { background: #e8e0d8; }
  .icon-move { background: #dce8dc; }
  .icon-life { background: #e4e0da; }
  .section-title { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; }
  .section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-left: auto; }

  /* Items */
  .item { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; border-bottom: 1px dashed var(--line); cursor: pointer; transition: opacity 0.2s; user-select: none; }
  .item:last-child { border-bottom: none; }
  .item:hover { opacity: 0.82; }
  .checkbox { width: 18px; height: 18px; border: 1.5px solid var(--line); border-radius: 5px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .item.done .checkbox { background: var(--check); border-color: var(--check); box-shadow: 0 2px 6px rgba(140,123,107,0.3); }
  .item.done .checkbox::after { content: '✓'; color: white; font-size: 11px; font-weight: bold; }
  .item-text { font-size: 13px; line-height: 1.6; flex: 1; transition: color 0.2s; }
  .item.done .item-text { text-decoration: line-through; color: var(--muted); }
  .item-note { font-size: 11px; color: var(--muted); margin-top: 1px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.02em; }

  /* Week intro */
  .week-intro {
    background: linear-gradient(135deg, #eee9e2, #f5f2ed); border-left: 3px solid var(--accent);
    padding: 12px 16px; margin-bottom: 16px; font-size: 12.5px; line-height: 1.7;
    color: var(--ink); border-radius: 0 10px 10px 0;
  }
  .week-intro strong { color: var(--accent); }

  /* Calorie tracker */
  .calorie-wrap { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
  .calorie-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; display: block; }
  .calorie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .calorie-cell { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 10px 8px 10px; text-align: center; }
  .calorie-cell-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 7px; }
  .calorie-cell input[type=number] {
    width: 100%; border: none; background: transparent; text-align: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 500;
    color: var(--ink); outline: none;
  }
  .calorie-cell input[type=number]::placeholder { color: var(--line); font-size: 14px; }
  .calorie-cell input[type=number]:focus { color: var(--accent); }
  .calorie-cell .kcal-unit { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 8px; }
  .calorie-cell .meal-divider { border: none; border-top: 1px dashed var(--line); margin: 7px 0; }
  .calorie-cell input[type=time] {
    width: 100%; border: none; background: transparent; text-align: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink); outline: none;
    margin-bottom: 5px;
  }
  .calorie-cell input[type=time]:focus { color: var(--accent); }
  .calorie-cell select {
    width: 100%; border: none; background: transparent; text-align: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted);
    outline: none; cursor: pointer; appearance: none; -webkit-appearance: none;
    padding: 2px 0;
  }
  .calorie-cell select:focus { color: var(--accent); }
  .calorie-total {
    background: var(--accent); color: white; border-radius: 10px 10px 0 0; padding: 9px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .calorie-total-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.12em; opacity: 0.85; }
  .calorie-total-val { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 500; }
  .calorie-balance {
    border: 1px solid var(--accent); border-top: none; border-radius: 0 0 10px 10px;
    padding: 9px 14px; display: flex; align-items: center; justify-content: space-between;
    background: var(--paper);
  }
  .calorie-balance-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--muted); }
  .calorie-balance-val { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 500; }
  .calorie-balance-val.over { color: #e05555; }
  .calorie-balance-val.under { color: var(--accent2); }
  .calorie-ideal-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 14px 9px; border: 1px solid var(--line); border-top: none; border-radius: 0;
    background: var(--bg);
  }
  .calorie-ideal-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--muted); }
  .calorie-ideal-val { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); }


  /* Meal content & AI analysis */
  .meal-content-wrap { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); }
  .meal-content-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .meal-content-cell { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 8px; }
  .meal-content-cell-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 5px; }
  .meal-content-cell textarea {
    width: 100%; border: none; background: transparent; resize: none;
    font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--ink);
    outline: none; line-height: 1.5; min-height: 54px;
  }
  .meal-content-cell textarea::placeholder { color: var(--line); }
  .ai-analyze-btn {
    width: 100%; background: var(--ink); color: white; border: none; border-radius: 10px;
    padding: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em;
    cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .ai-analyze-btn:hover { opacity: 0.8; }
  .ai-analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .ai-result {
    margin-top: 12px; background: var(--paper); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; font-size: 13px; line-height: 1.8; color: var(--ink); display: none;
  }
  .ai-result.visible { display: block; }
  .ai-result-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .ai-loading { text-align: center; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 16px; }
  .ai-loading::after { content: ''; animation: dots 1.2s infinite; }
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

  /* Memo */
  .memo { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
  .memo label { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
  .memo textarea {
    width: 100%; min-height: 72px; border: 1px solid var(--line); background: var(--bg);
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--ink); padding: 10px 12px;
    border-radius: 10px; resize: vertical; outline: none; line-height: 1.7;
  }
  .memo textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(140,123,107,0.12); }

  .reset-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--muted);
    background: none; border: 1px solid var(--line); border-radius: 8px; padding: 6px 14px;
    cursor: pointer; margin-top: 14px; transition: all 0.2s;
  }
  .reset-btn:hover { border-color: #e05555; color: #e05555; }

  footer { display: none; }

  /* Weight tracker */
  .weight-wrap {
    background: var(--paper); border: 1px solid var(--line); border-radius: 16px;
    padding: 18px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(44,38,32,0.06);
  }
  .weight-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .weight-title { font-size: 14px; font-weight: 700; letter-spacing: 0.05em; }
  .weight-input-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    background: var(--bg); border-radius: 10px; padding: 10px 14px; border: 1px solid var(--line);
  }
  .weight-day-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent); min-width: 60px; font-weight: 500; }
  .weight-input {
    flex: 1; border: none; background: transparent; font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; font-weight: 500; color: var(--ink); outline: none; text-align: center;
  }
  .weight-input::placeholder { color: var(--line); }
  .weight-unit { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }
  .weight-save-btn {
    background: var(--accent); color: white; border: none; border-radius: 8px;
    padding: 7px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
    cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
  }
  .weight-save-btn:hover { opacity: 0.85; }
  .weight-diff { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
  .weight-diff.plus { color: #e05555; background: #fdeaea; }
  .weight-diff.minus { color: var(--accent2); background: #dff5ef; }
  .weight-diff.zero { color: var(--muted); background: var(--bg); }
  canvas#weightChart { width: 100% !important; }
  .weight-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px;
  }
  .stat-box {
    background: var(--bg); border-radius: 10px; padding: 10px; text-align: center; border: 1px solid var(--line);
  }
  .stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 4px; }
  .stat-val { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 500; color: var(--ink); }
  .stat-val.good { color: var(--accent2); }
  .stat-val.bad { color: #e05555; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="label-tag">April 2026</div>
    <h1>DIET PROGRAM</h1>
    <div class="sub">Goal: −1.0 kg / 30 days</div>
  </header>

  <div class="progress-bar-wrap">
    <span class="progress-text">月間進捗</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>

  <div class="calendar-wrap">
    <div class="cal-header">
      <div class="cal-title">2026年 4月</div>
      <div class="cal-week-badge" id="calWeekBadge">Week 1</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- Weight tracker -->
  <div class="weight-wrap">
    <div class="weight-header">
      <div class="weight-title">⚖️ 体重記録</div>
      <div id="weightDiff"></div>
    </div>
    <div class="weight-input-row">
      <div class="weight-day-label" id="weightDayLabel">4月1日</div>
      <input class="weight-input" type="number" id="weightInput" placeholder="00.0" step="0.1" min="30" max="200">
      <div class="weight-unit">kg</div>
      <button class="weight-save-btn" onclick="saveWeight()">記録</button>
    </div>
    <canvas id="weightChart" height="140"></canvas>
    <div class="weight-stats">
      <div class="stat-box"><div class="stat-label">START</div><div class="stat-val" id="statStart">—</div></div>
      <div class="stat-box"><div class="stat-label">CURRENT</div><div class="stat-val" id="statCurrent">—</div></div>
      <div class="stat-box"><div class="stat-label">CHANGE</div><div class="stat-val" id="statChange">—</div></div>
    </div>
  </div>

  <div class="checklist-area" id="checklistArea"></div>

  <footer>Kusano Design — April 2026</footer>
</div>

<script>

  {

        {text:'寝る前に軽いストレッチを5分やる',note:'YouTube「ストレッチ 5分」で検索するだけでOK'},

const APRIL_DAYS = 30;
const START_DOW = 3; // 4/1 = 水曜日
const DOW_NAMES = ['日','月','火','水','木','金','土'];

let selectedDay = 1;

// dows指定がある項目は該当曜日のみ表示
function isItemVisible(item, dow) {
  return !item.dows || item.dows.includes(dow);
}

function getWeekIndex(day) {
  if (day <= 7) return 0;
  if (day <= 14) return 1;
  if (day <= 21) return 2;
  return 3;
}

function skey(day, wi, si, ii) { return `diet26-d${day}-w${wi}-s${si}-i${ii}`; }
function mkey(day) { return `diet26-memo-d${day}`; }

function hasDayData(day, wi) {
  return WEEKS[wi].sections.some((sec, si) =>
    sec.items.some((_, ii) => localStorage.getItem(skey(day, wi, si, ii)) === 'true')
  );
}
function isDayComplete(day, wi) {
  return WEEKS[wi].sections.every((sec, si) =>
    sec.items.every((_, ii) => localStorage.getItem(skey(day, wi, si, ii)) === 'true')
  );
}

function buildCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['日','月','火','水','木','金','土'].forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'cal-dow' + (i===0?' sun':i===6?' sat':'');
    el.textContent = d;
    grid.appendChild(el);
  });
  for (let i = 0; i < START_DOW; i++) grid.appendChild(document.createElement('div'));

  for (let day = 1; day <= APRIL_DAYS; day++) {
    const dow = (START_DOW + day - 1) % 7;
    const wi = getWeekIndex(day);
    const el = document.createElement('div');
    el.className = 'cal-day';
    if (dow === 0) el.classList.add('sun-day');
    if (dow === 6) el.classList.add('sat-day');
    if (day === selectedDay) el.classList.add('selected');
    if (hasDayData(day, wi)) el.classList.add('has-data');
    if (isDayComplete(day, wi)) el.classList.add('complete');
    el.innerHTML = `<span class="day-num">${day}</span><span class="dot"></span>`;
    el.onclick = () => selectDay(day);
    el.id = `cal-day-${day}`;
    grid.appendChild(el);
  }
}

function refreshCalDay(day) {
  const wi = getWeekIndex(day);
  const el = document.getElementById(`cal-day-${day}`);
  if (!el) return;
  el.classList.toggle('has-data', hasDayData(day, wi));
  el.classList.toggle('complete', isDayComplete(day, wi));
}

function selectDay(day) {
  selectedDay = day;
  document.querySelectorAll('.cal-day').forEach(e => e.classList.remove('selected'));
  const el = document.getElementById(`cal-day-${day}`);
  if (el) el.classList.add('selected');
  const wi = getWeekIndex(day);
  document.getElementById('calWeekBadge').textContent = WEEKS[wi].label;
  renderChecklist();
  updateOverallProgress();
}

function renderChecklist() {
  const area = document.getElementById('checklistArea');
  const wi = getWeekIndex(selectedDay);
  const w = WEEKS[wi];
  const dow = (START_DOW + selectedDay - 1) % 7;

  let total = 0, done = 0;
  w.sections.forEach((sec, si) => sec.items.forEach((item, ii) => {
    if (!isItemVisible(item, dow)) return;
    total++;
    if (localStorage.getItem(skey(selectedDay, wi, si, ii)) === 'true') done++;
  }));

  let html = `
    <div class="date-header">
      <div class="date-badge">
        <span class="day-big">${selectedDay}</span>${DOW_NAMES[dow]}
      </div>
      <div class="date-info">
        <div class="week-label">${w.label} — ${w.theme}</div>
        <div class="day-progress" id="dayProgress">${done} / ${total} 完了</div>
      </div>
    </div>
    <div class="week-intro"><strong>${w.label}：${w.theme}</strong><br>${w.intro}</div>
  `;

  w.sections.forEach((sec, si) => {
    const visibleItems = sec.items.filter(item => isItemVisible(item, dow));
    if (visibleItems.length === 0) return;
    const secDone = visibleItems.filter((item, vi) => {
      const ii = sec.items.indexOf(item);
      return localStorage.getItem(skey(selectedDay, wi, si, ii)) === 'true';
    }).length;
    html += `<div class="section">
      <div class="section-head">
        <div class="section-icon ${sec.cls}">${sec.icon}</div>
        <div class="section-title">${sec.title}</div>
        <div class="section-count" id="cnt-${si}">${secDone}/${visibleItems.length}</div>
      </div>`;
    sec.items.forEach((item, ii) => {
      if (!isItemVisible(item, dow)) return;
      const checked = localStorage.getItem(skey(selectedDay, wi, si, ii)) === 'true';
      const dowBadge = item.dows ? `<span style="font-family:'DM Mono',monospace;font-size:10px;background:#eef1fc;color:var(--accent);padding:1px 6px;border-radius:4px;margin-left:6px">${item.dows.map(d=>['日','月','火','水','木','金','土'][d]).join('・')}曜</span>` : '';
      html += `<div class="item${checked?' done':''}" onclick="toggleItem(${si},${ii},this)">
        <div class="checkbox"></div>
        <div><div class="item-text">${item.text}${dowBadge}</div><div class="item-note">${item.note}</div></div>
      </div>`;
    });
    html += `</div>`;
  });

  const memo = localStorage.getItem(mkey(selectedDay)) || '';
  const calB = parseFloat(localStorage.getItem(ckey(selectedDay,'b'))) || '';
  const calL = parseFloat(localStorage.getItem(ckey(selectedDay,'l'))) || '';
  const calD = parseFloat(localStorage.getItem(ckey(selectedDay,'d'))) || '';
  const calTotal = (parseFloat(calB)||0) + (parseFloat(calL)||0) + (parseFloat(calD)||0);
  const timeB = localStorage.getItem(ckey(selectedDay,'tb')) || '';
  const timeL = localStorage.getItem(ckey(selectedDay,'tl')) || '';
  const timeD = localStorage.getItem(ckey(selectedDay,'td')) || '';
  const typeB = localStorage.getItem(ckey(selectedDay,'typeb')) || '';
  const typeL = localStorage.getItem(ckey(selectedDay,'typel')) || '';
  const typeD = localStorage.getItem(ckey(selectedDay,'typed')) || '';
  const mealTypes = ['', '自炊', '外食', 'コンビニ'];
  function selOpts(cur) { return mealTypes.map(t => `<option value="${t}" ${cur===t?'selected':''}>${t||'種別'}</option>`).join(''); }
  html += `
    <div class="calorie-wrap">
      <span class="calorie-label">Calories — 今日の食事記録</span>
      <div class="calorie-grid">
        <div class="calorie-cell">
          <div class="calorie-cell-label">BREAKFAST</div>
          <input type="number" id="calB" placeholder="0" min="0" max="9999" value="${calB}" oninput="saveCalorie('b',this.value)">
          <div class="kcal-unit">kcal</div>
          <hr class="meal-divider">
          <input type="time" id="timeB" value="${timeB}" onchange="saveMealMeta('tb',this.value)">
          <select onchange="saveMealMeta('typeb',this.value)">${selOpts(typeB)}</select>
        </div>
        <div class="calorie-cell">
          <div class="calorie-cell-label">LUNCH</div>
          <input type="number" id="calL" placeholder="0" min="0" max="9999" value="${calL}" oninput="saveCalorie('l',this.value)">
          <div class="kcal-unit">kcal</div>
          <hr class="meal-divider">
          <input type="time" id="timeL" value="${timeL}" onchange="saveMealMeta('tl',this.value)">
          <select onchange="saveMealMeta('typel',this.value)">${selOpts(typeL)}</select>
        </div>
        <div class="calorie-cell">
          <div class="calorie-cell-label">DINNER</div>
          <input type="number" id="calD" placeholder="0" min="0" max="9999" value="${calD}" oninput="saveCalorie('d',this.value)">
          <div class="kcal-unit">kcal</div>
          <hr class="meal-divider">
          <input type="time" id="timeD" value="${timeD}" onchange="saveMealMeta('td',this.value)">
          <select onchange="saveMealMeta('typed',this.value)">${selOpts(typeD)}</select>
        </div>
      </div>
      <div class="calorie-total">
        <span class="calorie-total-label">TOTAL</span>
        <span class="calorie-total-val" id="calTotal">${calTotal > 0 ? calTotal + ' kcal' : '— kcal'}</span>
      </div>
      <div class="calorie-ideal-row">
        <span class="calorie-ideal-label">IDEAL TARGET</span>
        <span class="calorie-ideal-val">1,400 kcal</span>
      </div>
      <div class="calorie-balance">
        <span class="calorie-balance-label">BALANCE</span>
        <span class="calorie-balance-val ${calTotal > 0 ? (calTotal > 1400 ? 'over' : 'under') : ''}" id="calBalance">
          ${calTotal > 0 ? (calTotal > 1400 ? '+' : '') + (calTotal - 1400) + ' kcal' : '—'}
        </span>
      </div>
    </div>

    <div class="meal-content-wrap">
      <div class="meal-content-grid">
        <div class="meal-content-cell">
          <div class="meal-content-cell-label">BREAKFAST</div>
          <textarea id="mealB" placeholder="例）ご飯、味噌汁、目玉焼き" onchange="saveMealContent('mb',this.value)">${localStorage.getItem(ckey(selectedDay,'mb'))||''}</textarea>
        </div>
        <div class="meal-content-cell">
          <div class="meal-content-cell-label">LUNCH</div>
          <textarea id="mealL" placeholder="例）チキンサラダ、スープ" onchange="saveMealContent('ml',this.value)">${localStorage.getItem(ckey(selectedDay,'ml'))||''}</textarea>
        </div>
        <div class="meal-content-cell">
          <div class="meal-content-cell-label">DINNER</div>
          <textarea id="mealD" placeholder="例）鮭の塩焼き、野菜炒め" onchange="saveMealContent('md',this.value)">${localStorage.getItem(ckey(selectedDay,'md'))||''}</textarea>
        </div>
      </div>
      <button class="ai-analyze-btn" id="aiBtn" onclick="analyzeNutrition()">
        <span>✦</span> 栄養分析・メニュー提案
      </button>
      <div class="ai-result" id="aiResult"></div>
    </div>

    <div class="memo">
      <label>Memo — 今日の気づき・体調メモ</label>
      <textarea id="memoArea" placeholder="ここに自由に記録してください…" onchange="saveMemo()">${memo}</textarea>
    </div>
    <button class="reset-btn" onclick="resetDay()">この日のチェックをリセット</button>
  `;
  area.innerHTML = html;
}

function toggleItem(si, ii, el) {
  el.classList.toggle('done');
  const wi = getWeekIndex(selectedDay);
  localStorage.setItem(skey(selectedDay, wi, si, ii), el.classList.contains('done') ? 'true' : 'false');

  // update section count
  const dow2 = (START_DOW + selectedDay - 1) % 7;
  const sec = WEEKS[wi].sections[si];
  const visItems = sec.items.filter(item => isItemVisible(item, dow2));
  const secDone = visItems.filter(item => {
    const iii = sec.items.indexOf(item);
    return localStorage.getItem(skey(selectedDay, wi, si, iii)) === 'true';
  }).length;
  const cntEl = document.getElementById(`cnt-${si}`);
  if (cntEl) cntEl.textContent = `${secDone}/${visItems.length}`;

  // update day progress
  let total = 0, done = 0;
  WEEKS[wi].sections.forEach((s, ssi) => s.items.forEach((item, iii) => {
    if (!isItemVisible(item, dow2)) return;
    total++;
    if (localStorage.getItem(skey(selectedDay, wi, ssi, iii)) === 'true') done++;
  }));
  document.getElementById('dayProgress').textContent = `${done} / ${total} 完了`;

  refreshCalDay(selectedDay);
  updateOverallProgress();
}

function ckey(day, meal) { return `diet26-cal-d${day}-${meal}`; }

function saveCalorie(meal, val) {
  const v = parseFloat(val);
  if (!isNaN(v) && v >= 0) {
    localStorage.setItem(ckey(selectedDay, meal), v);
  } else {
    localStorage.removeItem(ckey(selectedDay, meal));
  }
  // 合計更新
  const b = parseFloat(localStorage.getItem(ckey(selectedDay,'b'))) || 0;
  const l = parseFloat(localStorage.getItem(ckey(selectedDay,'l'))) || 0;
  const d = parseFloat(localStorage.getItem(ckey(selectedDay,'d'))) || 0;
  const total = b + l + d;
  const el = document.getElementById('calTotal');
  if (el) el.textContent = total > 0 ? total + ' kcal' : '— kcal';
  const ideal = 1400;
  const balEl = document.getElementById('calBalance');
  if (balEl) {
    if (total > 0) {
      const diff = total - ideal;
      balEl.textContent = (diff > 0 ? '+' : '') + diff + ' kcal';
      balEl.className = 'calorie-balance-val ' + (diff > 0 ? 'over' : 'under');
    } else {
      balEl.textContent = '—';
      balEl.className = 'calorie-balance-val';
    }
  }
}


function saveMealContent(key, val) {
  if (val.trim()) {
    localStorage.setItem(ckey(selectedDay, key), val);
  } else {
    localStorage.removeItem(ckey(selectedDay, key));
  }
}

async function analyzeNutrition() {
  const mealB = document.getElementById('mealB')?.value.trim() || '';
  const mealL = document.getElementById('mealL')?.value.trim() || '';
  const mealD = document.getElementById('mealD')?.value.trim() || '';

  if (!mealB && !mealL && !mealD) {
    alert('食事内容を入力してください');
    return;
  }

  const btn = document.getElementById('aiBtn');
  const result = document.getElementById('aiResult');
  btn.disabled = true;
  result.className = 'ai-result visible';
  result.innerHTML = '<div class="ai-loading">分析中</div>';

  const calB = localStorage.getItem(ckey(selectedDay,'b')) || '不明';
  const calL = localStorage.getItem(ckey(selectedDay,'l')) || '不明';
  const calD = localStorage.getItem(ckey(selectedDay,'d')) || '不明';
  const typeB = localStorage.getItem(ckey(selectedDay,'typeb')) || '';
  const typeL = localStorage.getItem(ckey(selectedDay,'typel')) || '';
  const typeD = localStorage.getItem(ckey(selectedDay,'typed')) || '';

  const prompt = `あなたは管理栄養士です。以下の食事記録を分析してください。

【対象者プロフィール】
女性・43歳・身長162cm・デスクワーク中心・ダイエット中（目標摂取1400kcal/日）

【本日の食事記録】
朝食${typeB ? '（'+typeB+'）' : ''}：${mealB || 'なし'}（${calB} kcal）
昼食${typeL ? '（'+typeL+'）' : ''}：${mealL || 'なし'}（${calL} kcal）
夕食${typeD ? '（'+typeD+'）' : ''}：${mealD || 'なし'}（${calD} kcal）

以下の形式で簡潔に回答してください：

【栄養バランス評価】
タンパク質・脂質・糖質・ビタミン・ミネラル・食物繊維について各1〜2行で評価

【不足している栄養素】
箇条書きで3つ以内

【明日のおすすめメニュー】
朝・昼・夜それぞれ1案、簡潔に

【ひとことアドバイス】
1〜2行で励ましも込めて`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const text = data.content?.[0]?.text || 'エラーが発生しました';

    // markdown風テキストをHTMLに変換
    const html = text
      .replace(/【(.+?)】/g, '<div class="ai-result-title">$1</div>')
      .replace(/
/g, '<br>');

    result.innerHTML = html;
  } catch(e) {
    result.innerHTML = '<div style="color:#e05555;font-size:12px">分析に失敗しました。もう一度お試しください。</div>';
  }
  btn.disabled = false;
}

function saveMealMeta(key, val) {
  if (val) {
    localStorage.setItem(ckey(selectedDay, key), val);
  } else {
    localStorage.removeItem(ckey(selectedDay, key));
  }
}

function saveMemo() {
  localStorage.setItem(mkey(selectedDay), document.getElementById('memoArea').value);
}

function resetDay() {
  if (!confirm(`4月${selectedDay}日のチェックをリセットしますか？`)) return;
  const wi = getWeekIndex(selectedDay);
  WEEKS[wi].sections.forEach((sec, si) =>
    sec.items.forEach((_, ii) => localStorage.removeItem(skey(selectedDay, wi, si, ii)))
  );
  refreshCalDay(selectedDay);
  renderChecklist();
  updateOverallProgress();
}

function updateOverallProgress() {
  let total = 0, done = 0;
  for (let day = 1; day <= APRIL_DAYS; day++) {
    const wi = getWeekIndex(day);
    WEEKS[wi].sections.forEach((sec, si) => sec.items.forEach((_, ii) => {
      total++;
      if (localStorage.getItem(skey(day, wi, si, ii)) === 'true') done++;
    }));
  }
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

// Init
buildCalendar();
renderChecklist();
updateOverallProgress();

function syncWeightUI() {
  // ラベル更新
  document.getElementById('weightDayLabel').textContent = `4月${selectedDay}日`;
  // インプット更新
  const saved = localStorage.getItem(wkey(selectedDay));
  document.getElementById('weightInput').value = saved || '';
  // 前日差分
  updateWeightDiff();
}

function updateWeightDiff() {
  const diffEl = document.getElementById('weightDiff');
  const today = parseFloat(localStorage.getItem(wkey(selectedDay)));
  // 前日を探す（記録がある直近の日）
  let prev = null;
  for (let d = selectedDay - 1; d >= 1; d--) {
    const v = parseFloat(localStorage.getItem(wkey(d)));
    if (!isNaN(v)) { prev = v; break; }
  }
  if (isNaN(today) || prev === null) { diffEl.innerHTML = ''; return; }
  const diff = (today - prev).toFixed(1);
  const cls = diff > 0 ? 'plus' : diff < 0 ? 'minus' : 'zero';
  const sign = diff > 0 ? '+' : '';
  diffEl.innerHTML = `<span class="weight-diff ${cls}">${sign}${diff} kg</span>`;
}

function saveWeight() {
  const val = parseFloat(document.getElementById('weightInput').value);
  if (isNaN(val) || val < 30 || val > 200) {
    document.getElementById('weightInput').focus(); return;
  }
  localStorage.setItem(wkey(selectedDay), val.toFixed(1));

  // グラフ更新
  weightChart.data.datasets[0].data[selectedDay - 1] = val;
  weightChart.data.datasets[0].pointRadius[selectedDay - 1] = 6;
  recalcYAxis();
  weightChart.update('active');

  updateWeightDiff();
  updateWeightStats();
}

function recalcYAxis() {
  const vals = weightChart.data.datasets[0].data.filter(v => v !== null);
  if (vals.length < 2) return;
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const pad = Math.max((max - min) * 0.5, 0.5);
  weightChart.options.scales.y.suggestedMin = Math.floor((min - pad) * 2) / 2;
  weightChart.options.scales.y.suggestedMax = Math.ceil((max + pad) * 2) / 2;
}

function updateWeightChart() {
  if (!weightChart) return;
  // 選択日のポイント強調
  weightChart.data.datasets[0].pointBackgroundColor =
    weightChart.data.datasets[0].data.map((v, i) => v !== null && i+1 === selectedDay ? '#8c7b6b' : 'white');
  weightChart.data.datasets[0].pointRadius =
    weightChart.data.datasets[0].data.map((v, i) => v !== null ? (i+1 === selectedDay ? 6 : 4) : 0);
  weightChart.update('none');
}

function updateWeightStats() {
  const vals = Array.from({length: APRIL_DAYS}, (_, i) => {
    const v = parseFloat(localStorage.getItem(wkey(i+1)));
    return isNaN(v) ? null : v;
  });
  const recorded = vals.filter(v => v !== null);
  const startEl = document.getElementById('statStart');
  const curEl = document.getElementById('statCurrent');
  const chgEl = document.getElementById('statChange');

  if (recorded.length === 0) {
    startEl.textContent = '—'; curEl.textContent = '—'; chgEl.textContent = '—';
    chgEl.className = 'stat-val'; return;
  }
  const first = recorded[0];
  // 直近記録
  let latest = null;
  for (let d = APRIL_DAYS; d >= 1; d--) {
    const v = parseFloat(localStorage.getItem(wkey(d)));
    if (!isNaN(v)) { latest = v; break; }
  }
  const change = latest !== null ? (latest - first).toFixed(1) : null;
  startEl.textContent = `${first} kg`;
  curEl.textContent = latest !== null ? `${latest} kg` : '—';
  if (change !== null) {
    const sign = change > 0 ? '+' : '';
    chgEl.textContent = `${sign}${change} kg`;
    chgEl.className = 'stat-val ' + (change < 0 ? 'good' : change > 0 ? 'bad' : '');
  }
}

// selectDayにweight UI syncを追加
const _origSelectDay = selectDay;
// override selectDay to also sync weight UI
function selectDay(day) {
  selectedDay = day;
  document.querySelectorAll('.cal-day').forEach(e => e.classList.remove('selected'));
  const el = document.getElementById(`cal-day-${day}`);
  if (el) el.classList.add('selected');
  const wi = getWeekIndex(day);
  document.getElementById('calWeekBadge').textContent = WEEKS[wi].label;
  renderChecklist();
  updateOverallProgress();
  syncWeightUI();
  updateWeightChart();
}

initWeightChart();
syncWeightUI();
</script>
